<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>

Expense Dashboard

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>

💳 Smart Expense Tracker

</h1>

<div class="summary">

<div class="card income-card">

<h3>

Income

</h3>

<h2 id="income">

₹0

</h2>

</div>

<div class="card expense-card">

<h3>

Expense

</h3>

<h2 id="expense">

₹0

</h2>

</div>

</div>

<div class="balance-card">

<h2>

Balance

</h2>

<h1 id="balance">

₹0

</h1>

</div>

<input
id="text"
placeholder="Transaction">

<input
id="amount"
type="number"
placeholder="Amount">

<div class="buttons">

<button
class="income-btn"
onclick="addIncome()">

➕ Income

</button>

<button
class="expense-btn"
onclick="addExpense()">

➖ Expense

</button>

</div>

<ul id="list">

</ul>

<button
onclick="logout()">

Logout

</button>

</div>

<script
src="script.js">

</script>

</body>

</html>
